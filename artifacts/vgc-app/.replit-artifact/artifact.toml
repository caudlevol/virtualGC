kind = "web"
previewPath = "/"
title = "Virtual General Contractor"
version = "1.0.0"
id = "artifacts/vgc-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24922

[services.development]
run = "pnpm --filter @workspace/vgc-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vgc-app", "run", "build" ]
publicDir = "artifacts/vgc-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24922"
BASE_PATH = "/"
